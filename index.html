<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>和Annie一起變變變面積</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- FontAwesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@500;700;900&display=swap');
        body {
            font-family: 'Noto Sans TC', sans-serif;
            background-color: #f2efe9; 
            color: #4a4e4d;
            overflow: hidden; /* 徹底鎖定螢幕，防止手機瀏覽器上下滾動 */
            position: fixed;
            width: 100%;
            height: 100%;
        }
        /* 加大操控點碰觸範圍，更適合小朋友手指拖拉 */
        .magic-handle {
            transition: transform 0.15s ease, fill 0.15s ease;
            cursor: grab;
        }
        .magic-handle:active {
            cursor: grabbing;
            transform: scale(1.4);
        }
    </style>
</head>
<body class="flex flex-col h-screen h-[100dvh] justify-between p-3 select-none">

    <!-- 頂部極簡單行導覽列 -->
    <header class="w-full flex items-center justify-between bg-[#e5dfd3] bg-opacity-70 backdrop-blur-sm py-2 px-3 rounded-xl shadow-sm z-10 shrink-0 mb-1">
        <h1 class="text-base font-black text-[#4a4e4d] tracking-wide">和Annie一起變變變面積 ✨</h1>
        <span class="text-[10px] bg-[#b5c2b7] text-[#4a584d] px-2.5 py-1 rounded-full font-bold shadow-sm shrink-0">
            Annie 的幾何世界 🎨
        </span>
    </header>

    <!-- 中央核心：12x8 實體格子紙畫布 (自適應剩餘所有高度，100%不溢出) -->
    <div class="flex-grow my-1 relative bg-[#faf9f6] border-2 border-[#e5dfd3] rounded-2xl overflow-hidden shadow-inner flex items-center justify-center min-h-0 h-0">
        
        <!-- SVG 畫布：使用 600x420 固定比例 viewBox，保證所有大文字完整呈現不被切邊 -->
        <svg id="geo-canvas" class="w-full h-full select-none" viewBox="0 0 600 420" xmlns="http://www.w3.org/2000/svg" style="touch-action: none;">
            <!-- 背景網格線與 12x8 格子紙 (將由 JS 生成) -->
            <g id="grid-lines"></g>

            <!-- 下底同高三角形（呈現下三角時高亮） -->
            <polygon id="svg-lower-triangle" fill="rgba(224, 159, 141, 0.35)" stroke="#e09f8d" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" stroke-dasharray="5 5" style="display: none;"></polygon>
            
            <!-- 主核心目標圖形 -->
            <polygon id="svg-main-shape" fill="rgba(142, 154, 175, 0.25)" stroke="#8e9aaf" stroke-width="3.5" stroke-linejoin="round" stroke-linecap="round"></polygon>
            
            <!-- 身高指示線與直角記號 -->
            <line id="svg-height-line" stroke="#87986a" stroke-width="2.5" stroke-dasharray="4 4" stroke-linecap="round"></line>
            <path id="svg-right-angle" fill="none" stroke="#87986a" stroke-width="1.5"></path>
            
            <!-- 外側大型數字標籤 (字體超大、加粗且完全避開網格座標，極清晰) -->
            <text id="svg-height-text" fill="#6b7a52" font-weight="900" font-size="18" text-anchor="end" alignment-baseline="middle">高度 = 4</text>
            <text id="svg-base-text" fill="#5c677d" font-weight="900" font-size="18" text-anchor="middle">底邊 = 6</text>

            <!-- 魔法觸控操控球：右上角 (控制高、斜度) - 🟢 -->
            <circle id="handle-top-right" class="magic-handle" r="14" fill="#87986a" stroke="#ffffff" stroke-width="3.5" shadow-md></circle>
            
            <!-- 魔法觸控操控球：右下角 (控制底邊長度) - 🔵 -->
            <circle id="handle-bottom-right" class="magic-handle" r="14" fill="#6d7993" stroke="#ffffff" stroke-width="3.5" shadow-md></circle>
        </svg>

        <!-- 形狀名稱浮動提示 -->
        <div class="absolute bottom-2 left-3 bg-[#e5dfd3] bg-opacity-80 px-2.5 py-1 rounded-md text-[10px] font-black text-[#5a6467] pointer-events-none">
            目前形狀：<span id="label-shape-name">平行四邊形 ▱</span>
        </div>
    </div>

    <!-- 下方整合式操作面板與數據呈現 (完全水平鋪開，和諧且數字超清晰) -->
    <div class="w-full bg-white rounded-2xl border border-[#d8d3c9] p-3 flex flex-col space-y-3 shrink-0">
        
        <!-- 第一橫排：形狀選擇與輔助線勾選 -->
        <div class="grid grid-cols-2 gap-3 shrink-0">
            <!-- 1. 形狀快速切換鈕 -->
            <div class="flex bg-[#f2efe9] p-1 rounded-xl border border-[#d4cbba] w-full">
                <button id="btn-parallelogram" onclick="setShape('parallelogram')" class="flex-1 py-2 rounded-lg text-xs font-black transition-all bg-[#8e9aaf] text-white shadow-sm flex items-center justify-center space-x-1">
                    <span>▱ 四邊形</span>
                </button>
                <button id="btn-triangle" onclick="setShape('triangle')" class="flex-1 py-2 rounded-lg text-xs font-black transition-all text-[#7f8c8d] flex items-center justify-center space-x-1">
                    <span>🔺 三角形</span>
                </button>
            </div>

            <!-- 2. 呈現下三角自訂勾選鈕 (觸控範圍超大好按) -->
            <button id="btn-toggle-triangle" onclick="toggleTriangleOption()" class="w-full py-2 px-2 rounded-xl border-2 border-[#ebdcd0] bg-[#faf9f6] text-xs font-black text-slate-700 flex items-center justify-center space-x-2 transition-all">
                <i id="triangle-btn-icon" class="fa-solid fa-eye-slash text-slate-400 text-sm"></i>
                <span id="triangle-btn-text">呈現下三角</span>
            </button>
        </div>

        <!-- 第二橫排：特大字體面積數據呈現區 (黑底金字高對比，手機上非常醒目) -->
        <div class="grid grid-cols-2 gap-3 shrink-0">
            <!-- 總面積面板 -->
            <div class="bg-[#4a5356] text-white p-2.5 rounded-xl text-center flex items-center justify-between px-4 shadow-inner">
                <span class="text-xs text-[#c2c9c6] font-black"><i class="fa-solid fa-crown text-amber-400 mr-1.5"></i>圖形面積</span>
                <span id="metric-total-area" class="text-2xl font-black text-amber-300">24 <span class="text-xs font-bold text-[#c2c9c6]">格</span></span>
            </div>
            <!-- 下三角面積面板 (勾選後即時呈現) -->
            <div id="small-triangle-report" class="bg-[#e09f8d] bg-opacity-20 border-2 border-[#e09f8d] border-opacity-40 p-2.5 rounded-xl text-center flex items-center justify-between px-4 transition-all" style="visibility: hidden;">
                <span class="text-xs text-[#b86b57] font-black"><i class="fa-solid fa-triangle mr-1.5"></i>下三角面積</span>
                <span id="metric-triangle-area" class="text-2xl font-black text-[#b86b57]">12 <span class="text-xs font-bold text-[#b86b57]">格</span></span>
            </div>
        </div>

        <!-- 第三橫排：色彩更換畫筆 (保留在最下方) -->
        <div class="flex items-center justify-between border-t border-[#f2efe9] pt-2 w-full shrink-0">
            <span class="text-xs font-black text-[#7f8c8d] ml-1"><i class="fa-solid fa-wand-magic-sparkles mr-1.5 text-[#b5c2b7]"></i>幫圖形換個衣服：</span>
            <div class="flex items-center space-x-4 pr-2">
                <button onclick="changeColor('blue')" id="palette-blue" class="w-8 h-8 rounded-full bg-[#8e9aaf] border-2 border-white shadow-md transform scale-110 transition-transform"></button>
                <button onclick="changeColor('green')" id="palette-green" class="w-8 h-8 rounded-full bg-[#a3b18a] border-2 border-transparent shadow-sm transition-transform"></button>
                <button onclick="changeColor('pink')" id="palette-pink" class="w-8 h-8 rounded-full bg-[#cdb4db] border-2 border-transparent shadow-sm transition-transform"></button>
                <button onclick="changeColor('orange')" id="palette-orange" class="w-8 h-8 rounded-full bg-[#ddb892] border-2 border-transparent shadow-sm transition-transform"></button>
            </div>
        </div>
    </div>

    <!-- 互動核心 JS -->
    <script>
        // --- 核心幾何整數狀態 ---
        let currentShape = 'parallelogram';
        let base = 6;
        let height = 4;
        let slant = 2;
        let showLowerTriangle = false;
        
        // --- 莫蘭迪色調設定 ---
        let activeColorKey = 'blue';
        const colorPalette = {
            blue: { mainFill: 'rgba(142, 154, 175, 0.25)', mainStroke: '#8e9aaf', subFill: 'rgba(224, 159, 141, 0.35)', subStroke: '#e09f8d', hex: '#8e9aaf' },
            green: { mainFill: 'rgba(163, 177, 138, 0.25)', mainStroke: '#a3b18a', subFill: 'rgba(212, 163, 115, 0.35)', subStroke: '#d4a373', hex: '#a3b18a' },
            pink: { mainFill: 'rgba(205, 180, 219, 0.25)', mainStroke: '#cdb4db', subFill: 'rgba(189, 224, 254, 0.35)', subStroke: '#bde0fe', hex: '#cdb4db' },
            orange: { mainFill: 'rgba(221, 184, 146, 0.25)', mainStroke: '#ddb892', subFill: 'rgba(156, 175, 136, 0.35)', subStroke: '#9caf88', hex: '#ddb892' }
        };

        // --- 穩定的虛擬網格錨點（600x420 固定 viewBox 比例，完美防止大字被切掉） ---
        const GRID_SCALE = 34; 
        const ORIGIN_X = 85;   
        const ORIGIN_Y = 320;  

        // --- 拖拉狀態 ---
        let activeHandle = null; 
        let startMouseX = 0;
        let startMouseY = 0;
        let startBase = 6;
        let startHeight = 4;
        let startSlant = 2;

        const svg = document.getElementById('geo-canvas');

        // --- 初始化載入 ---
        window.addEventListener('load', () => {
            generateDynamicGrid();
            setupTouchEvents();
            renderGeometry();
        });

        // 鋪滿 12x8 的格子紙，留白給四周標籤
        function generateDynamicGrid() {
            const gridLinesContainer = document.getElementById('grid-lines');
            let gridHTML = '';
            
            const paperWidth = 12 * GRID_SCALE;
            const paperHeight = 8 * GRID_SCALE;

            // 1. 幾何格子紙卡片背景 (圓角卡片)
            gridHTML += `<rect x="${ORIGIN_X}" y="${ORIGIN_Y - paperHeight}" width="${paperWidth}" height="${paperHeight}" fill="#faf9f6" stroke="#ebdcd0" stroke-width="2.5" rx="8" />`;

            // 2. 內部的直向與橫向格線
            for (let i = 0; i <= 12; i++) {
                const x = ORIGIN_X + i * GRID_SCALE;
                gridHTML += `<line x1="${x}" y1="${ORIGIN_Y - paperHeight}" x2="${x}" y2="${ORIGIN_Y}" stroke="#ebdcd0" stroke-width="1.2" />`;
            }
            for (let j = 0; j <= 8; j++) {
                const y = ORIGIN_Y - j * GRID_SCALE;
                gridHTML += `<line x1="${ORIGIN_X}" y1="${y}" x2="${ORIGIN_X + paperWidth}" y2="${y}" stroke="#ebdcd0" stroke-width="1.2" />`;
            }

            // 3. X 軸刻度 (放大並加粗)
            for (let i = 0; i <= 12; i += 2) {
                const x = ORIGIN_X + i * GRID_SCALE;
                gridHTML += `<text x="${x}" y="${ORIGIN_Y + 18}" fill="#7a7265" font-size="12" font-weight="black" text-anchor="middle">${i}</text>`;
            }
            // 4. Y 軸刻度 (放大並加粗)
            for (let j = 0; j <= 8; j += 2) {
                const y = ORIGIN_Y - j * GRID_SCALE;
                gridHTML += `<text x="${ORIGIN_X - 12}" y="${y + 4}" fill="#7a7265" font-size="12" font-weight="black" text-anchor="end">${j}</text>`;
            }

            gridLinesContainer.innerHTML = gridHTML;
        }

        // --- 轉換螢幕座標為 SVG 內部虛擬座標（徹底解決手勢偏離漂移問題） ---
        function getSVGPoint(e, svgElement) {
            const point = svgElement.createSVGPoint();
            const clientX = e.touches ? e.touches[0].clientX : e.clientX;
            const clientY = e.touches ? e.touches[0].clientY : e.clientY;
            point.x = clientX;
            point.y = clientY;

            const ctm = svgElement.getScreenCTM();
            if (ctm) {
                return point.matrixTransform(ctm.inverse());
            }
            return point;
        }

        // --- UI 控制函式 ---

        function changeColor(colorKey) {
            activeColorKey = colorKey;
            Object.keys(colorPalette).forEach(k => {
                const btn = document.getElementById(`palette-${k}`);
                if (k === colorKey) {
                    btn.classList.add('scale-110', 'border-white');
                    btn.classList.remove('scale-100', 'border-transparent');
                } else {
                    btn.classList.remove('scale-110', 'border-white');
                    btn.classList.add('scale-100', 'border-transparent');
                }
            });
            renderGeometry();
        }

        function setShape(shapeType) {
            currentShape = shapeType;
            const btnP = document.getElementById('btn-parallelogram');
            const btnT = document.getElementById('btn-triangle');
            const wrapper = document.getElementById('btn-toggle-triangle');

            if (shapeType === 'parallelogram') {
                btnP.className = "flex-1 py-2 rounded-lg text-xs font-black transition-all bg-[#8e9aaf] text-white shadow-sm flex items-center justify-center space-x-1";
                btnT.className = "flex-1 py-2 rounded-lg text-xs font-black transition-all text-[#7f8c8d] flex items-center justify-center space-x-1";
                wrapper.style.opacity = "1";
                wrapper.style.pointerEvents = "auto";
            } else {
                btnT.className = "flex-1 py-2 rounded-lg text-xs font-black transition-all bg-[#8e9aaf] text-white shadow-sm flex items-center justify-center space-x-1";
                btnP.className = "flex-1 py-2 rounded-lg text-xs font-black transition-all text-[#7f8c8d] flex items-center justify-center space-x-1";
                showLowerTriangle = false;
                wrapper.style.opacity = "0.4";
                wrapper.style.pointerEvents = "none";
                document.getElementById('small-triangle-report').style.visibility = 'hidden';
            }
            updateControlsState();
            renderGeometry();
        }

        function toggleTriangleOption() {
            if (currentShape !== 'parallelogram') return;
            showLowerTriangle = !showLowerTriangle;
            updateControlsState();
            renderGeometry();
        }

        // 更新右側「下三角自訂按鈕」的亮起狀態
        function updateControlsState() {
            const btn = document.getElementById('btn-toggle-triangle');
            const icon = document.getElementById('triangle-btn-icon');
            
            if (showLowerTriangle) {
                btn.className = "w-full py-2 px-2 rounded-xl border-2 border-[#e09f8d] bg-[#fdf2f0] text-xs font-black text-[#b86b57] flex items-center justify-center space-x-2 transition-all";
                icon.className = "fa-solid fa-eye text-[#e09f8d] text-sm";
            } else {
                btn.className = "w-full py-2 px-2 rounded-xl border-2 border-[#ebdcd0] bg-[#faf9f6] text-xs font-bold text-slate-700 flex items-center justify-center space-x-2 transition-all";
                icon.className = "fa-solid fa-eye-slash text-slate-400 text-sm";
            }
        }

        // --- 核心拖拉點擊事件 ---
        function setupTouchEvents() {
            const handleTopRight = document.getElementById('handle-top-right');
            const handleBottomRight = document.getElementById('handle-bottom-right');

            const onStart = (e, handleId) => {
                e.preventDefault();
                activeHandle = handleId;

                const svgPt = getSVGPoint(e, svg);
                startMouseX = svgPt.x;
                startMouseY = svgPt.y;
                
                startBase = base;
                startHeight = height;
                startSlant = slant;
            };

            handleTopRight.addEventListener('mousedown', (e) => onStart(e, 'top-right'));
            handleTopRight.addEventListener('touchstart', (e) => onStart(e, 'top-right'), { passive: false });
            handleBottomRight.addEventListener('mousedown', (e) => onStart(e, 'bottom-right'));
            handleBottomRight.addEventListener('touchstart', (e) => onStart(e, 'bottom-right'), { passive: false });

            const onMove = (e) => {
                if (!activeHandle) return;

                const svgPt = getSVGPoint(e, svg);

                const svgDeltaX = svgPt.x - startMouseX;
                const svgDeltaY = svgPt.y - startMouseY;

                const deltaX = svgDeltaX / GRID_SCALE;
                const deltaY = svgDeltaY / GRID_SCALE;

                if (activeHandle === 'bottom-right') {
                    let newBase = Math.round(startBase + deltaX);
                    base = Math.max(1, Math.min(12 - slant, newBase));
                } else if (activeHandle === 'top-right') {
                    let newHeight = Math.round(startHeight - deltaY);
                    let newSlant = Math.round(startSlant + deltaX);
                    
                    height = Math.max(1, Math.min(8, newHeight));
                    slant = Math.max(0, Math.min(4, newSlant));
                    
                    if (base + slant > 12) {
                        slant = 12 - base;
                    }
                }
                renderGeometry();
            };

            const onEnd = () => {
                activeHandle = null;
            };

            window.addEventListener('mousemove', onMove);
            window.addEventListener('touchmove', onMove, { passive: false });
            window.addEventListener('mouseup', onEnd);
            window.addEventListener('touchend', onEnd);
        }

        // --- 核心幾何渲染繪製 ---
        function renderGeometry() {
            const ax = ORIGIN_X;
            const ay = ORIGIN_Y;
            const bx = ORIGIN_X + base * GRID_SCALE;
            const by = ORIGIN_Y;

            let cx, cy, dx, dy;

            const mainShapeEl = document.getElementById('svg-main-shape');
            const lowerTriangleEl = document.getElementById('svg-lower-triangle');
            const heightLineEl = document.getElementById('svg-height-line');
            const heightTextEl = document.getElementById('svg-height-text');
            const baseTextEl = document.getElementById('svg-base-text');
            const rightAngleEl = document.getElementById('svg-right-angle');
            
            const handleTopRight = document.getElementById('handle-top-right');
            const handleBottomRight = document.getElementById('handle-bottom-right');

            const theme = colorPalette[activeColorKey];
            mainShapeEl.setAttribute('fill', theme.mainFill);
            mainShapeEl.setAttribute('stroke', theme.mainStroke);
            lowerTriangleEl.setAttribute('fill', theme.subFill);
            lowerTriangleEl.setAttribute('stroke', theme.subStroke);

            if (currentShape === 'parallelogram') {
                cx = ORIGIN_X + (base + slant) * GRID_SCALE;
                cy = ORIGIN_Y - height * GRID_SCALE;
                dx = ORIGIN_X + slant * GRID_SCALE;
                dy = ORIGIN_Y - height * GRID_SCALE;

                mainShapeEl.setAttribute('points', `${ax},${ay} ${bx},${by} ${cx},${cy} ${dx},${dy}`);
                
                if (showLowerTriangle) {
                    lowerTriangleEl.setAttribute('points', `${ax},${ay} ${bx},${by} ${dx},${dy}`);
                    lowerTriangleEl.style.display = 'block';
                    document.getElementById('small-triangle-report').style.visibility = 'visible';
                } else {
                    lowerTriangleEl.style.display = 'none';
                    document.getElementById('small-triangle-report').style.visibility = 'hidden';
                }

                const labelShapeText = (slant === 0) ? "長方形 🟩" : "平行四邊形 ▱";
                document.getElementById('label-shape-name').innerText = labelShapeText;
                const area = base * height;
                document.getElementById('metric-total-area').innerHTML = `${area} <span class="text-xs font-bold text-[#c2c9c6]">格</span>`;
                document.getElementById('metric-triangle-area').innerHTML = `${area / 2} <span class="text-xs font-bold text-[#b86b57]">格</span>`;

                // 🟢 操控球定位在右上頂點 (C)
                handleTopRight.setAttribute('cx', cx);
                handleTopRight.setAttribute('cy', cy);
            } else {
                cx = ORIGIN_X + slant * GRID_SCALE;
                cy = ORIGIN_Y - height * GRID_SCALE;

                mainShapeEl.setAttribute('points', `${ax},${ay} ${bx},${by} ${cx},${cy}`);
                lowerTriangleEl.style.display = 'none';
                document.getElementById('small-triangle-report').style.visibility = 'hidden';

                const labelShapeText = (slant === 0) ? "直角三角形 📐" : "三角形 🔺";
                document.getElementById('label-shape-name').innerText = labelShapeText;
                const area = (base * height) / 2;
                document.getElementById('metric-total-area').innerHTML = `${area} <span class="text-xs font-bold text-[#c2c9c6]">格</span>`;

                // 🟢 操控球定位在頂部頂點 (C)
                handleTopRight.setAttribute('cx', cx);
                handleTopRight.setAttribute('cy', cy);
            }

            // 🔵 操控球完美鎖定在右下頂點 (B) ── 徹底解決飄到天上的 Bug！
            handleBottomRight.setAttribute('cx', bx);
            handleBottomRight.setAttribute('cy', by);

            // 調整高度參考線
            heightLineEl.setAttribute('x1', ORIGIN_X);
            heightLineEl.setAttribute('y1', ORIGIN_Y - height * GRID_SCALE);
            heightLineEl.setAttribute('x2', ORIGIN_X);
            heightLineEl.setAttribute('y2', ORIGIN_Y);

            // 高度文字向左偏移 34 像素，完全避開座標
            heightTextEl.setAttribute('x', ORIGIN_X - 34);
            heightTextEl.setAttribute('y', ORIGIN_Y - (height * GRID_SCALE) / 2);
            heightTextEl.textContent = `高度 = ${height}`;

            // 底邊文字向下偏移 38 像素，完全避開下方座標
            baseTextEl.setAttribute('x', ORIGIN_X + (base * GRID_SCALE) / 2);
            baseTextEl.setAttribute('y', ORIGIN_Y + 38);
            baseTextEl.textContent = `底邊 = ${base}`;

            const hBox = 10;
            rightAngleEl.setAttribute('d', `M ${ORIGIN_X + hBox} ${ORIGIN_Y} L ${ORIGIN_X + hBox} ${ORIGIN_Y - hBox} L ${ORIGIN_X} ${ORIGIN_Y - hBox}`);
        }
    </script>
</body>
</html>
